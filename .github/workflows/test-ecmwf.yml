name: Test descarga ECMWF

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-ecmwf:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Probar descarga ECMWF
        run: python scripts/test_ecmwf_download.py

      - name: Guardar GRIB de prueba
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/test_ecmwf_haines.grib2
          git commit -m "Añade GRIB de prueba ECMWF" || echo "Sin cambios que guardar"
          git push
