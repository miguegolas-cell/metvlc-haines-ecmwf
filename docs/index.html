<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>MetVlc · Haines ECMWF</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f9f9fe;
      color: #263238;
    }

    .page {
      max-width: 1200px;
      margin: 25px auto;
      background: #ffffff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 28px rgba(0,0,0,0.14);
    }

    .header {
      background: linear-gradient(135deg, #0b2f4f 0%, #0b6fa4 65%, #ff6a2a 100%);
      color: white;
      padding: 18px 24px;
      text-align: center;
    }

    .header h1 {
      margin: 0;
      font-size: 25px;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    .header p {
      margin: 6px 0 0;
      font-size: 14px;
      color: #e8f5ff;
    }

    .controls {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      padding: 15px;
      background: #f6f9fb;
      border-bottom: 1px solid #dfe8ee;
    }

    .controls button {
      border: 0;
      padding: 9px 16px;
      border-radius: 10px;
      background: #0b2f4f;
      color: white;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 3px 10px rgba(0,0,0,0.12);
      transition: 0.2s ease;
    }

    .controls button:hover {
      background: #14527d;
    }

    .controls button.active {
      background: #ff6a2a;
    }

    #map {
      width: 100%;
      height: 720px;
      background: #dce8ee;
    }

    .legend {
      padding: 14px 18px;
      background: #ffffff;
      border-top: 1px solid #dfe8ee;
      font-size: 14px;
      line-height: 1.8;
      text-align: center;
    }

    .legend span {
      display: inline-block;
      width: 18px;
      height: 14px;
      margin-right: 6px;
      vertical-align: middle;
      border: 1px solid rgba(0,0,0,0.15);
      border-radius: 3px;
    }

    .meta {
      font-size: 13px;
      color: #51636d;
      padding: 0 18px 18px;
      background: #ffffff;
      text-align: center;
      line-height: 1.5;
    }

    .popup-title {
      font-weight: 800;
      color: #0b2f4f;
      font-size: 15px;
      margin-bottom: 5px;
    }

    .popup-haines {
      font-weight: 800;
      font-size: 17px;
    }

    .leaflet-control-layers {
      border-radius: 10px !important;
      box-shadow: 0 4px 14px rgba(0,0,0,0.18) !important;
      font-size: 13px;
    }

    @media screen and (max-width: 900px) {
      .header h1 {
        font-size: 21px;
      }

      #map {
        height: 560px;
      }

      .legend {
        font-size: 13px;
      }
    }
  </style>
</head>

<body>

  <div class="page">

    <div class="header">
      <h1>Índice de Haines · ECMWF</h1>
      <p>Haines medio y alto · ECMWF Open Data · Comunitat Valenciana</p>
    </div>

   <div class="controls">
  <button id="btn-medio" class="active" onclick="cambiarTipoHaines('medio')">
    Haines medio
  </button>

  <button id="btn-alto" onclick="cambiarTipoHaines('alto')">
    Haines alto
  </button>
</div>

<div id="fechaValidez" style="
  background:#ffffff;
  color:#0b2f4f;
  text-align:center;
  font-family:Arial, sans-serif;
  font-size:15px;
  font-weight:800;
  padding:10px 15px;
  border-bottom:1px solid #dfe8ee;
">
  Cargando fecha de validez...
</div>

    <div id="map"></div>

    <div class="legend">
      <b>Leyenda Haines:</b>
      &nbsp;&nbsp;
      <span style="background:#2b83ba;"></span> Bajo 2-3
      &nbsp;&nbsp;
      <span style="background:#abdda4;"></span> Moderado 4
      &nbsp;&nbsp;
      <span style="background:#fdae61;"></span> Alto 5
      &nbsp;&nbsp;
      <span style="background:#d7191c;"></span> Muy alto 6
    </div>

    <div class="meta" id="metadata">
      Cargando datos...
    </div>

  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    let geojsonData = null;
    let metadataData = null;
    let hainesLayer = null;
    let cvLayer = null;
    let tipoHainesActual = "medio";
    const GRID_STEP = 0.25;

    const map = L.map("map", {
      preferCanvas: true,
      zoomControl: true
    }).setView([39.35, -0.45], 8);

    const osm = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap"
    });

    const esriTopo = L.tileLayer(
      "https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}",
      {
        maxZoom: 18,
        attribution: "Tiles &copy; Esri"
      }
    );

    const openTopo = L.tileLayer(
      "https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png",
      {
        maxZoom: 17,
        attribution: "Map data: &copy; OpenStreetMap contributors, SRTM | Map style: &copy; OpenTopoMap"
      }
    );

    esriTopo.addTo(map);

    const baseMaps = {
      "Relieve · Esri": esriTopo,
      "Topográfico · OpenTopo": openTopo,
      "Calles · OSM": osm
    };

    L.control.layers(baseMaps, null, {
      collapsed: false
    }).addTo(map);

    function getHainesProps(props, tipo) {
      if (tipo === "alto") {
        return {
          nombre: "Haines alto",
          descripcion: "Estabilidad 700-500 hPa + sequedad 700 hPa",
          valor: props.haines_alto,
          nivel: props.haines_alto_nivel,
          color: props.haines_alto_color,
          A: props.alto_A_estabilidad,
          B: props.alto_B_sequedad,
          detalle: `
            <b>T700:</b> ${props.T700_C} ºC<br>
            <b>T500:</b> ${props.T500_C} ºC<br>
            <b>HR700:</b> ${props.HR700} %<br>
            <b>Td700:</b> ${props.Td700_C} ºC<br>
            <b>Depresión 700:</b> ${props.depresion_700} ºC
          `
        };
      }

      return {
        nombre: "Haines medio",
        descripcion: "Estabilidad 850-700 hPa + sequedad 850 hPa",
        valor: props.haines_medio,
        nivel: props.haines_medio_nivel,
        color: props.haines_medio_color,
        A: props.medio_A_estabilidad,
        B: props.medio_B_sequedad,
        detalle: `
          <b>T850:</b> ${props.T850_C} ºC<br>
          <b>T700:</b> ${props.T700_C} ºC<br>
          <b>HR850:</b> ${props.HR850} %<br>
          <b>Td850:</b> ${props.Td850_C} ºC<br>
          <b>Depresión 850:</b> ${props.depresion_850} ºC
        `
      };
    }

    function markerRadius(valor) {
      if (valor >= 6) return 10;
      if (valor === 5) return 9;
      if (valor === 4) return 8;
      return 7;
    }

    function popupContent(props) {
      const h = getHainesProps(props, tipoHainesActual);

      return `
        <div class="popup-title">${h.nombre} ECMWF</div>
        <b>Índice:</b> <span class="popup-haines" style="color:${h.color};">${h.valor}</span><br>
        <b>Nivel:</b> ${h.nivel}<br>
        <b>A · Estabilidad:</b> ${h.A}<br>
        <b>B · Sequedad:</b> ${h.B}<br>
        <hr>
        ${h.detalle}
      `;
    }

    function styleFeature(feature) {
      const props = feature.properties;
      const h = getHainesProps(props, tipoHainesActual);

      return {
        radius: markerRadius(h.valor),
        fillColor: h.color || "#666666",
        color: "#1f2d36",
        weight: 1.2,
        opacity: 1,
        fillOpacity: 0.85
      };
    }
function getCellBounds(lat, lon) {
  const half = GRID_STEP / 2;

  return [
    [lat - half, lon - half],
    [lat + half, lon + half]
  ];
}
    function formatMadridTime(isoString) {
      if (!isoString) return "—";

      const fecha = new Date(isoString);

      return fecha.toLocaleString("es-ES", {
        timeZone: "Europe/Madrid",
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function actualizarBotones() {
      document.getElementById("btn-medio").classList.remove("active");
      document.getElementById("btn-alto").classList.remove("active");

      if (tipoHainesActual === "medio") {
        document.getElementById("btn-medio").classList.add("active");
      } else {
        document.getElementById("btn-alto").classList.add("active");
      }
    }

   function dibujarHaines() {
  if (!geojsonData) return;

  if (hainesLayer) {
    map.removeLayer(hainesLayer);
  }

  hainesLayer = L.layerGroup();

  geojsonData.features.forEach(feature => {
    const coords = feature.geometry.coordinates;
    const lon = coords[0];
    const lat = coords[1];
    const props = feature.properties;
    const h = getHainesProps(props, tipoHainesActual);

    const rect = L.rectangle(getCellBounds(lat, lon), {
      stroke: false,
      fillColor: h.color || "#666666",
      fillOpacity: 0.65
    });

    rect.bindPopup(popupContent(props));
    rect.addTo(hainesLayer);
  });

  hainesLayer.addTo(map);

  actualizarMetadatos();
}

    function cambiarTipoHaines(tipo) {
      tipoHainesActual = tipo;
      actualizarBotones();
      dibujarHaines();
    }

    function actualizarMetadatos() {
      if (!metadataData) return;

      const generado = formatMadridTime(metadataData.generado_utc);
      const validTime = metadataData.valid_time ? formatMadridTime(metadataData.valid_time) : "—";
      document.getElementById("fechaValidez").innerHTML = `
  Válido para: ${validTime} hora peninsular
`;

      const descripcion = tipoHainesActual === "alto"
        ? "Haines alto: estabilidad 700-500 hPa y sequedad a 700 hPa."
        : "Haines medio: estabilidad 850-700 hPa y sequedad a 850 hPa.";

      document.getElementById("metadata").innerHTML = `
        <b>Fuente:</b> ECMWF Open Data ·
        <b>Tipo mostrado:</b> ${tipoHainesActual === "alto" ? "Haines alto" : "Haines medio"} ·
        <b>Puntos:</b> ${metadataData.puntos || geojsonData.features.length}<br>
        <b>Válido para:</b> ${validTime} hora peninsular ·
        <b>Generado:</b> ${generado} hora peninsular<br>
        ${descripcion} Producto calculado para la pasada 00 UTC, alcance +15 h. 
        El Haines bajo oficial no se muestra porque requiere 950 hPa.
      `;
    }

    Promise.all([
      fetch("haines.geojson?v=" + new Date().getTime()).then(response => {
        if (!response.ok) throw new Error("No se pudo cargar haines.geojson");
        return response.json();
      }),
      fetch("metadata.json?v=" + new Date().getTime()).then(response => {
        if (!response.ok) throw new Error("No se pudo cargar metadata.json");
        return response.json();
      }),
      fetch("cv.geojson?v=" + new Date().getTime()).then(response => {
        if (!response.ok) throw new Error("No se pudo cargar cv.geojson");
        return response.json();
      })
    ])
    .then(([geojson, metadata, cv]) => {
      geojsonData = geojson;
      metadataData = metadata;

      cvLayer = L.geoJSON(cv, {
        style: {
          color: "#0b2f4f",
          weight: 2,
          fill: false,
          opacity: 1
        }
      }).addTo(map);

      dibujarHaines();

      if (cvLayer.getBounds().isValid()) {
        map.fitBounds(cvLayer.getBounds(), {
          padding: [25, 25]
        });
      } else if (hainesLayer && hainesLayer.getBounds().isValid()) {
        map.fitBounds(hainesLayer.getBounds(), {
          padding: [25, 25]
        });
      }
    })
    .catch(error => {
      console.error(error);
      document.getElementById("metadata").innerHTML =
        "Error al cargar los datos Haines ECMWF. Revisa haines.geojson, metadata.json y cv.geojson.";
    });
  </script>

</body>
</html>
